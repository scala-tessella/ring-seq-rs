name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Run the full CI suite first ───────────────────────────────────────
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  # ── Publish to crates.io ──────────────────────────────────────────────
  publish:
    name: Publish to crates.io
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Verify tag matches Cargo.toml version
        run: |
          CARGO_VERSION="v$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')"
          TAG="${GITHUB_REF#refs/tags/}"
          if [ "$CARGO_VERSION" != "$TAG" ]; then
            echo "::error::Tag $TAG does not match Cargo.toml version $CARGO_VERSION"
            exit 1
          fi

      - name: Publish
        run: cargo publish --allow-dirty --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"

  # ── Create GitHub release ─────────────────────────────────────────────
  github-release:
    name: GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes
